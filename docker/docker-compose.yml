services:
  postgres:
    image: postgres:15-bullseye
    container_name: contract_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contractuser
      POSTGRES_PASSWORD: contractpassword
      POSTGRES_DB: contracts
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: contract_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:

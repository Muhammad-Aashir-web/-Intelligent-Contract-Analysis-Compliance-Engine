services:
  postgres:
    image: postgres:15-bullseye
    container_name: contract_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contractuser
      POSTGRES_PASSWORD: contractpassword
      POSTGRES_DB: contracts
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
      - contract-network
  redis:
    image: redis:7-alpine
    container_name: contract_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - default
      - contract-network
  n8n:
    image: n8nio/n8n:latest
    container_name: contract-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "admin"
      N8N_BASIC_AUTH_PASSWORD: "contractai123"
      N8N_HOST: "localhost"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "Asia/Karachi"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - contract-network
  backend:
    build:
      context: ../backend
    container_name: contract-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/data/uploads:/app/data/uploads
    networks:
      - contract-network
  frontend:
    build:
      context: ../frontend
    container_name: contract-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - contract-network
volumes:
  postgres_data:
  redis_data:
  n8n_data:
networks:
  contract-network:
    driver: bridge
